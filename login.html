<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login</title>
  </head>

  <body
    class="bg-gray-100 flex items-center justify-center min-h-screen bg-purple-200"
  >
    <div class="bg-white shadow-xl rounded-2xl flex w-[900px] overflow-hidden">
      <!-- Left Side (Image / Branding) -->
      <div
        class="hidden md:flex w-1/2 bg-purple-600 items-center justify-center"
      >
        <pre class="text-white text-3xl font-bold">
Welcome Back 👋
To Velina
        </pre>
      </div>

      <!-- Right Side (Form) -->
      <div class="w-full md:w-1/2 p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Login</h2>

        <form class="space-y-5" onsubmit="login(event)" class="space-y-5">
          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-gray-600">Email</label>
            <input
              id="email"
              type="email"
              placeholder="Enter your email"
              class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none"
            />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-gray-600"
              >Password</label
            >
            <input
              type="password"
              placeholder="Enter your password"
              class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none"
            />
          </div>

          <!-- Remember + Forgot -->
          <div class="flex justify-between items-center text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-purple-600" />
              Remember me
            </label>
            <a href="#" class="text-purple-600 hover:underline"
              >Forgot password?</a
            >
          </div>

          <!-- Button -->
          <button
            onclick="login()"
            class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition"
          >
            Login
          </button>
        </form>

        <!-- Signup -->
        <p class="text-sm text-gray-600 mt-6 text-center">
          Don’t have an account?
          <a href="#" class="text-purple-600 font-medium hover:underline"
            >Sign up</a
          >
        </p>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
