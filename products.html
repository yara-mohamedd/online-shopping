<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Products</title>
  </head>

  <body class="bg-gray-100 p-6">
    <h1 class="text-3xl font-bold text-center mb-6 text-purple-900">
      PRODUCTS MENU
    </h1>

    <input
      id="search"
      type="text"
      placeholder="Search..."
      class="w-full p-2 mb-6 border rounded"
    />

    <div class="flex gap-6">
      <!-- 🟣 Sidebar -->
      <div class="w-1/4 bg-purple-200 p-4 rounded shadow h-fit">
        <h2 class="text-xl font-bold mb-4 text-purple-700">Filter</h2>

        <ul id="categories" class="space-y-2 text-purple-900"></ul>
      </div>

      <!-- 🟢 Products -->
      <div id="products" class="grid grid-cols-3 gap-6 w-3/4"></div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
